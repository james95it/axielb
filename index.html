<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Inspector | Live Axie Stats</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --block-bg: #111827;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .dashboard {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 1100px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { margin: 0; color: var(--accent); font-size: 1.8rem; }
        
        .refresh-btn {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background-color: var(--accent-hover); }
        .refresh-btn:disabled {
            background-color: #475569;
            color: var(--text-sub);
            cursor: not-allowed;
        }

        .status-text { text-align: center; color: var(--text-sub); font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }
        
        .account-block {
            background-color: var(--block-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .account-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 2px;
        }
        .account-wallet {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 1.5rem;
            word-break: break-all;
        }

        .stats-subgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .card { background-color: #243147; padding: 1rem; border-radius: 8px; text-align: center; }
        .card.full { grid-column: span 2; background-color: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); }
        .card h3 { margin: 0 0 0.4rem 0; color: var(--text-sub); font-size: 0.8rem; text-transform: uppercase; }
        .value { font-size: 1.5rem; font-weight: bold; }
        
        /* Hộp soi mã JSON thô mới */
        .inspector-title {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #f59e0b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-top: 1px dashed #334155;
            padding-top: 1rem;
        }
        .json-inspector {
            background-color: #020617;
            color: #3ade84;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            padding: 12px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            text-align: left;
            margin-top: 0.5rem;
            border: 1px solid #1e293b;
        }

        .loading { text-align: center; color: var(--accent); font-size: 1.2rem; padding: 2rem; }
        .error { text-align: center; color: var(--danger); font-size: 1.2rem; padding: 1rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Giám sát & Thám mã Axie API</h1>
        <button id="refresh-btn" class="refresh-btn">🔄 Làm mới tất cả</button>
    </div>

    <div id="update-status" class="status-text">Đang kết nối mạng lưới...</div>
    
    <div id="loading-state" class="loading">🔄 Đang phân tích cấu trúc gói tin API...</div>
    
    <div id="error-state" class="error" style="display: none;">
        <div>❌ Không thể kết nối hoặc tải file dữ liệu từ API.</div>
    </div>

    <div class="accounts-grid" id="accounts-container"></div>
</div>

<script>
    const REAL_API = "https://axie-bald.vercel.app/api/getPBB";
    
    const ACCOUNTS = [
        { name: "Cody", wallet: "0x9b3bc1c03e5a8889e893e54950a7c31c11301b79" },
        { name: "Crystie", wallet: "0xe9add5b325d2b7f869b3a3c7b1047600a76192f7" }
    ];
    
    let cachedRawData = null;

    function findWalletDeep(obj, targetWallet) {
        if (!obj || typeof obj !== 'object') return null;
        if (obj.user && String(obj.user).toLowerCase() === targetWallet.toLowerCase()) return obj;
        
        for (let key in obj) {
            if (obj.hasOwnProperty(key)) {
                const found = findWalletDeep(obj[key], targetWallet);
                if (found) return found;
            }
        }
        return null;
    }

    async function fetchRawDataWithFallback() {
        // Thử quét qua các cổng kết nối dự phòng để tránh nghẽn mạng
        const connectionEndpoints = [
            { name: "Direct", url: REAL_API },
            { name: "Proxy 1", url: "https://corsproxy.io/?" + encodeURIComponent(REAL_API) },
            { name: "Proxy 2", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(REAL_API)}` }
        ];

        for (let endpoint of connectionEndpoints) {
            try {
                const response = await fetch(endpoint.url);
                if (!response.ok) throw new Error();
                return await response.json(); 
            } catch (err) {}
        }
        return null;
    }

    function renderAllAccounts() {
        if (!cachedRawData) return;

        const container = document.getElementById('accounts-container');
        container.innerHTML = ''; 
        
        ACCOUNTS.forEach(acc => {
            const playerData = findWalletDeep(cachedRawData, acc.wallet);

            if (playerData) {
                const rank = playerData.rank || "N/A";
                const bountyPoint = playerData.score || "0"; 
                const axieScore = playerData.userProfile?.settings?.axieEcosystemStats?.axieScore || "0";
                
                // Hiển thị chuỗi JSON thu gọn của riêng ví này để chủ nhà kiểm tra cấu trúc cấu phần
                const rawJsonString = JSON.stringify(playerData, null, 2);

                const blockHtml = `
                    <div class="account-block">
                        <div class="account-title">Tài khoản: ${acc.name}</div>
                        <div class="account-wallet">${acc.wallet}</div>
                        
                        <div class="stats-subgrid">
                            <div class="card">
                                <h3>Thứ hạng (Rank)</h3>
                                <div class="value">#${rank}</div>
                            </div>
                            <div class="card">
                                <h3>Axie Score</h3>
                                <div class="value">${axieScore}</div>
                            </div>
                            <div class="card">
                                <h3>Bounty Point</h3>
                                <div class="value">${bountyPoint}</div>
                            </div>
                            <div class="card">
                                <h3>bAXS Reward</h3>
                                <div class="value" style="color: #f59e0b;" id="baxs-${acc.name}">Tìm cấu trúc...</div>
                            </div>
                            <div class="card full">
                                <h3>Dự kiến nhận về</h3>
                                <div class="value" style="color: var(--success);" id="axs-${acc.name}">- AXS</div>
                            </div>
                        </div>

                        <!-- Hộp thám mã hiển thị dữ liệu gốc từ API -->
                        <div class="inspector-title">🔍 Cấu trúc thuộc tính thật của ${acc.name}:</div>
                        <pre class="json-inspector">${rawJsonString}</pre>
                    </div>
                `;
                container.innerHTML += blockHtml;
            } else {
                container.innerHTML += `
                    <div class="account-block" style="border-color: var(--danger)">
                        <div class="account-title" style="color: var(--danger)">Tài khoản: ${acc.name}</div>
                        <div class="account-wallet">${acc.wallet}</div>
                        <div style="font-weight: bold; margin-top: 1rem; text-align:center; color:var(--danger)">❌ Ví không có trong danh sách của API này</div>
                    </div>
                `;
            }
        });

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('update-status').innerText = "Đã hiển thị bộ thám mã API thành công ✓";
    }

    async function updateDashboard() {
        document.getElementById('loading-state').style.display = 'block';
        document.getElementById('error-state').style.display = 'none';
        
        cachedRawData = await fetchRawDataWithFallback();

        if (cachedRawData) {
            renderAllAccounts();
        } else {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            document.getElementById('update-status').innerText = "Kết nối API thất bại.";
        }
    }

    document.getElementById('refresh-btn').addEventListener('click', updateDashboard);
    updateDashboard();
</script>

</body>
</html>
