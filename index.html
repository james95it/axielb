<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axie Bounty Board Monitor (Realtime DB Sync)</title>
    <!-- Tích hợp Firebase SDK bản Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --block-bg: #111827;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .dashboard {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 1100px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { margin: 0; color: var(--accent); font-size: 1.8rem; }
        
        .refresh-btn {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background-color: var(--accent-hover); }

        .status-text { text-align: center; color: var(--text-sub); font-size: 0.9rem; margin-bottom: 1rem; }
        
        /* Thanh thông báo nhắc nhở cày điểm ở phía trên */
        .warning-banner {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .accounts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .account-block { background-color: var(--block-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; transition: all 0.3s ease; }
        
        /* Class bôi đỏ thẻ khi chưa cày điểm */
        .account-block.lazy-alert {
            border-color: var(--danger);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            background-color: #1a131b;
        }

        .account-title { font-size: 1.3rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .account-wallet { font-family: monospace; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 1.5rem; word-break: break-all; }
        
        .stats-subgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .card { background-color: #243147; padding: 1rem; border-radius: 8px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card.highlight { border: 1px solid var(--accent); background-color: rgba(56, 189, 248, 0.03); }
        .card h3 { margin: 0 0 0.4rem 0; color: var(--text-sub); font-size: 0.8rem; text-transform: uppercase; }
        .value { font-size: 1.4rem; font-weight: bold; }
        
        .diff-container { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; align-items: center; border-top: 1px solid #334155; padding-top: 6px; }
        .diff-line { font-size: 0.75rem; font-weight: 500; }

        .loading { text-align: center; color: var(--accent); font-size: 1.2rem; padding: 2rem; }
        .error { text-align: center; color: var(--danger); font-size: 1.2rem; padding: 1rem; }

        @media (max-width: 640px) {
            .stats-subgrid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Giám Sát Điểm Axie Bounty (Realtime DB Sync)</h1>
        <button id="refresh-btn" class="refresh-btn">🔄 Làm mới điểm số</button>
    </div>

    <div id="update-status" class="status-text">Đang khởi tạo...</div>
    
    <!-- Vùng thông báo ví chưa cày điểm -->
    <div id="warning-banner" class="warning-banner" style="display: none;"></div>

    <div id="loading-state" class="loading">🔄 Đang tải dữ liệu thực tế...</div>
    <div id="error-state" class="error" style="display: none;">⚠️ Cần cấu hình thông tin Firebase Config chính xác trong mã nguồn.</div>

    <div class="accounts-grid" id="accounts-container"></div>
</div>

<script>
    // ===================================================
    // 1. ĐIỀN CHÍNH XÁC CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
    // ===================================================
    const firebaseConfig = {
  apiKey: "AIzaSyDoAeayAY4AiEJkJuupkuAj72awemwk-Bo",
  authDomain: "axielb-17704.firebaseapp.com",
  databaseURL: "https://axielb-17704-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "axielb-17704",
  storageBucket: "axielb-17704.firebasestorage.app",
  messagingSenderId: "901526066892",
  appId: "1:901526066892:web:7257fb8a98ef1c6da0d469",
  measurementId: "G-ZYVQLKT9XE"
};

    // Khởi tạo ứng dụng Firebase Realtime an toàn
    let db = null;
    try {
        if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        }
    } catch (e) {
        console.error("Lỗi cấu hình Firebase khởi tạo:", e);
    }

    // Danh sách tài khoản
    const ACCOUNTS = [
        { name: "Cody", wallet: "0x9b3bc1c03e5a8889e893e54950a7c31c11301b79" },
        { name: "Crystie", wallet: "0xe9add5b325d2b7f869b3a3c7b1047600a76192f7" },
        { name: "James1", wallet: "0x39fac7a74365c188c293bd9a064323b50e63cde7" },
	{ name: "Kuro", wallet: "0x20d9cb64a6c5cf875897a54cf171df930d612abb" },
	{ name: "Loki", wallet: "0xd985f56b366d1ea58a240b06c34a97919af168f5" },
	{ name: "Momo", wallet: "0x7f23FBA89336a1B6Cf7D58C88E5acD6656D59B5a" },
	{ name: "Omi", wallet: "0x92b626df33ba8bf0d3abd7297e48e5e48e1be030" },
	{ name: "Pokemon", wallet: "0xcee118fb6b827a5ce2eb61cca321e516fdccafdb" },
	{ name: "Randy", wallet: "0x7ca6b3a5d9ec0ba2ba00298aa67b768d9bbf7e01" },
	{ name: "Shiro", wallet: "0x641146919c8c720cc9f556cbb4f7f5e9d3e2dd73" },
    ];

    const REAL_API = "https://axie-bald.vercel.app/api/getPBB";
    let cachedRawData = null;

    // Mốc thời gian chốt điểm cố định: 10:01 sáng hàng ngày
    function getMostRecent1001AMMilestone() {
        const now = new Date();
        const milestone = new Date(now);
        milestone.setHours(10, 1, 0, 0); 
        if (now < milestone) {
            milestone.setDate(milestone.getDate() - 1);
        }
        return milestone.getTime();
    }

    function findWalletDeep(obj, targetWallet) {
        if (!obj || typeof obj !== 'object') return null;
        if (obj.user && String(obj.user).toLowerCase() === targetWallet.toLowerCase()) return obj;
        for (let key in obj) {
            if (obj.hasOwnProperty(key)) {
                const found = findWalletDeep(obj[key], targetWallet);
                if (found) return found;
            }
        }
        return null;
    }

    async function fetchRawDataWithFallback() {
        const connectionEndpoints = [
            { url: REAL_API },
            { url: "https://corsproxy.io/?" + encodeURIComponent(REAL_API) },
            { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(REAL_API)}` }
        ];
        for (let endpoint of connectionEndpoints) {
            try {
                const response = await fetch(endpoint.url);
                if (!response.ok) throw new Error();
                return await response.json(); 
            } catch (err) {}
        }
        return null;
    }

    async function updateDashboard() {
        document.getElementById('loading-state').style.display = 'block';
        document.getElementById('error-state').style.display = 'none';
        document.getElementById('warning-banner').style.display = 'none';
        
        cachedRawData = await fetchRawDataWithFallback();
        if (!cachedRawData) {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            document.getElementById('error-state').innerText = "❌ Lỗi: Không thể lấy dữ liệu từ Axie API.";
            return;
        }

        const container = document.getElementById('accounts-container');
        container.innerHTML = ''; 
        const currentMilestone = getMostRecent1001AMMilestone();
        
        let idleAccounts = [];

        for (let acc of ACCOUNTS) {
            const walletLower = acc.wallet.toLowerCase();
            const playerData = findWalletDeep(cachedRawData, acc.wallet);

            if (playerData) {
                const rank = playerData.rank || "N/A";
                const bountyPoint = parseInt(playerData.score, 10) || 0; 

                let prevScore = bountyPoint;
                let baselineScore = bountyPoint;
                let dbMilestone = 0;
                let firebaseSuccess = false;

                // Tương tác với Realtime Database
                if (db) {
                    try {
                        const dbRef = db.ref('bounty_tracker/' + walletLower);
                        const snapshot = await dbRef.once('value');
                        const dbData = snapshot.val();

                        if (dbData) {
                            dbMilestone = dbData.currentMilestone || 0;
                            prevScore = dbData.lastScore !== undefined ? dbData.lastScore : bountyPoint;
                            baselineScore = dbData.baselineScore !== undefined ? dbData.baselineScore : bountyPoint;

                            if (dbMilestone !== currentMilestone) {
                                baselineScore = prevScore;
                                dbMilestone = currentMilestone;
                            }
                        }

                        // Ghi ngược dữ liệu lên đám mây (giữ lại lastScore để làm mốc chuyển ngày)
                        await dbRef.update({
                            currentMilestone: currentMilestone,
                            lastScore: bountyPoint,
                            baselineScore: baselineScore
                        });
                        
                        firebaseSuccess = true;
                    } catch (dbError) {
                        console.error("Lỗi Realtime DB cho ví: " + walletLower, dbError);
                        firebaseSuccess = false;
                    }
                }

                const todayDiff = bountyPoint - baselineScore;

                // Kiểm tra trạng thái cày điểm dựa trên mốc 10:01 sáng
                const isLazy = todayDiff <= 0;
                if (isLazy) {
                    idleAccounts.push(acc.name);
                }

                let todayText = `<span class="diff-line" style="color: var(--text-sub);">🌞 Hôm nay: +0</span>`;
                if (todayDiff > 0) {
                    todayText = `<span class="diff-line" style="color: var(--warning); font-weight: bold;">🌞 Hôm nay: +${todayDiff}</span>`;
                }

                const cloudBadge = firebaseSuccess 
                    ? `<span style="color: var(--success); font-size: 0.75rem; font-weight: normal;">☁️ Đã đồng bộ</span>`
                    : `<span style="color: var(--danger); font-size: 0.75rem; font-weight: normal;">⚠️ Lỗi Cloud</span>`;

                const blockHtml = `
                    <div class="account-block ${isLazy ? 'lazy-alert' : ''}">
                        <div class="account-title" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Tài khoản: ${acc.name} ${isLazy ? '⚠️' : ''}</span>
                            ${cloudBadge}
                        </div>
                        <div class="account-wallet">${acc.wallet}</div>
                        
                        <div class="stats-subgrid">
                            <div class="card">
                                <h3>Thứ hạng (Rank)</h3>
                                <div class="value">#${rank}</div>
                            </div>
                            <div class="card highlight" style="${isLazy ? 'border-color: var(--danger);' : ''}">
                                <h3>Bounty Point</h3>
                                <div class="value" style="color: ${isLazy ? 'var(--danger)' : 'var(--accent)'};">${bountyPoint}</div>
                                <div class="diff-container">
                                    ${todayText}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += blockHtml;
            } else {
                container.innerHTML += `
                    <div class="account-block" style="border-color: var(--danger); text-align: center;">
                        <div class="account-title" style="color: var(--danger)">Tài khoản: ${acc.name}</div>
                        <div class="account-wallet">${acc.wallet}</div>
                        <div style="font-weight: bold; margin-top: 1rem; color: var(--danger)">❌ Ví chưa có dữ liệu trên API này</div>
                    </div>
                `;
            }
        }

        // Hiển thị danh sách cảnh báo lên phía trên web
        const banner = document.getElementById('warning-banner');
        if (idleAccounts.length > 0) {
            banner.innerHTML = `⚠️ <strong>Cảnh báo hôm nay:</strong> Tài khoản [ <span style="color: #fff; font-weight: bold;">${idleAccounts.join(', ')}</span> ] chưa cày điểm trong hôm nay! (Tính từ mốc 10:01 sáng)`;
            banner.style.display = 'block';
        } else {
            banner.style.display = 'none';
        }

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('update-status').innerText = "Đã cập nhật dữ liệu live thành công ✓";
    }

    document.getElementById('refresh-btn').addEventListener('click', updateDashboard);
    updateDashboard();
</script>

</body>
</html>
