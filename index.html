<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cody | Live Axie Stats</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .dashboard {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .header h1 { margin: 0; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .card { background-color: #334155; padding: 1.5rem; border-radius: 10px; text-align: center; }
        .card.full { grid-column: span 2; background-color: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); }
        .card h3 { margin: 0 0 0.5rem 0; color: var(--text-sub); font-size: 0.9rem; text-transform: uppercase; }
        .value { font-size: 1.8rem; font-weight: bold; }
        .loading { text-align: center; color: var(--accent); font-size: 1.2rem; padding: 2rem; }
        .error { text-align: center; color: var(--danger); font-size: 1.2rem; padding: 2rem; }
        .trend-down { color: var(--danger); font-size: 1.1rem; font-weight: normal; margin-left: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Tài khoản: Cody</h1>
        <p id="update-status">Đang đồng bộ dữ liệu live...</p>
    </div>
    
    <div id="loading-state" class="loading">🔄 Đang kết nối trực tiếp đến Axie API...</div>
    <div id="error-state" class="error" style="display: none;">❌ Không tìm thấy người chơi 'Cody' hoặc API đang bảo trì.</div>

    <div class="grid" id="stats-grid" style="display: none;">
        <div class="card">
            <h3>Thứ hạng (Rank)</h3>
            <div class="value" id="rank-val">-</div>
        </div>
        <div class="card">
            <h3>Axie Score</h3>
            <div class="value" id="score-val">-</div>
        </div>
        <div class="card">
            <h3>Bounty Point</h3>
            <div class="value" id="bounty-val">-</div>
        </div>
        <div class="card">
            <h3>bAXS Reward</h3>
            <div class="value" id="baxs-val" style="color: #f59e0b;">-</div>
        </div>
        <div class="card full">
            <h3>Dự kiến nhận về</h3>
            <div class="value" id="axs-val" style="color: var(--success);">- AXS</div>
        </div>
    </div>
</div>

<script>
    // Đường link API thực tế bạn vừa tìm được
    const REAL_API = "https://axie-bald.vercel.app/api/getPBB"; 
    
    // Bọc qua Proxy allorigins để GitHub Pages không bị dính lỗi CORS (chặn bảo mật chéo kênh)
    const PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(REAL_API)}`;

    async function fetchLiveStats() {
        try {
            const response = await fetch(PROXY_URL);
            if (!response.ok) throw new Error("API Connection Error");
            
            const rawData = await response.json();
            
            // Xử lý dữ liệu trả về (hỗ trợ cả mảng bọc ngoài hoặc object chứa mảng)
            let playerList = Array.isArray(rawData) ? rawData : (rawData.players || rawData.data || []);

            // Tìm kiếm tài khoản Cody (không phân biệt hoa thường)
            let codyData = playerList.find(player => {
                if (Array.isArray(player)) {
                    return player.some(val => String(val).toLowerCase() === 'cody');
                }
                return Object.values(player).some(val => String(val).toLowerCase() === 'cody');
            });

            if (codyData) {
                let rank, score, change, bounty, baxs, axs;

                // Nếu API trả về dạng mảng dựa theo log console trước đó
                if (Array.isArray(codyData)) {
                    rank = codyData[0];
                    score = codyData[2];
                    change = codyData[4] || "";
                    bounty = codyData[5];
                    baxs = codyData[9];
                    axs = codyData[10];
                } else {
                    // Dự phòng nếu API thay đổi cấu trúc sang dạng Object định danh
                    rank = codyData.rank || codyData.position || "N/A";
                    score = codyData.axieScore || codyData.score || "N/A";
                    change = codyData.change || codyData.rankChange || "";
                    bounty = codyData.bountyPoint || codyData.points || "N/A";
                    baxs = codyData.baxsReward || codyData.baxs || "N/A";
                    axs = codyData.axsReward || codyData.axs || "N/A";
                }

                // Cập nhật các chỉ số live vào giao diện
                document.getElementById('rank-val').innerHTML = `#${rank} <span class="trend-down">${change}</span>`;
                document.getElementById('score-val').innerText = score;
                document.getElementById('bounty-val').innerText = bounty;
                document.getElementById('baxs-val').innerText = baxs;
                document.getElementById('axs-val').innerText = `${axs} AXS`;

                // Thay đổi trạng thái hiển thị trên màn hình
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('stats-grid').style.display = 'grid';
                document.getElementById('update-status').innerText = "Cập nhật trực tiếp hoàn tất ✓";
            } else {
                showError();
            }
        } catch (error) {
            console.error("Lỗi fetch:", error);
            showError();
        }
    }

    function showError() {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        document.getElementById('update-status').innerText = "Lỗi kết nối dữ liệu.";
    }

    // Kích hoạt hàm gọi dữ liệu ngay khi tải trang
    fetchLiveStats();
</script>

</body>
</html>
