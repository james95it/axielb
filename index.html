<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cody | Live Axie Stats</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .dashboard {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .header h1 { margin: 0; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .card { background-color: #334155; padding: 1.5rem; border-radius: 10px; text-align: center; }
        .card.full { grid-column: span 2; background-color: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); }
        .card h3 { margin: 0 0 0.5rem 0; color: var(--text-sub); font-size: 0.9rem; text-transform: uppercase; }
        .value { font-size: 1.8rem; font-weight: bold; }
        .loading { text-align: center; color: var(--accent); font-size: 1.2rem; padding: 2rem; }
        .error { text-align: center; color: var(--danger); font-size: 1.2rem; padding: 1rem; }
        .debug-box {
            text-align: left;
            background-color: #0f172a;
            color: #94a3b8;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Tài khoản: Cody</h1>
        <p id="update-status">Đang thiết lập kết nối an toàn...</p>
    </div>
    
    <div id="loading-state" class="loading">🔄 Đang đồng bộ dữ liệu live từ mạng lưới...</div>
    
    <div id="error-state" class="error" style="display: none;">
        <div>❌ Gặp sự cố khi đồng bộ dữ liệu live.</div>
        <div class="debug-box" id="debug-log">Nhật ký lỗi hệ thống:</div>
    </div>

    <div class="grid" id="stats-grid" style="display: none;">
        <div class="card">
            <h3>Thứ hạng (Rank)</h3>
            <div class="value" id="rank-val">-</div>
        </div>
        <div class="card">
            <h3>Axie Score</h3>
            <div class="value" id="score-val">-</div>
        </div>
        <div class="card">
            <h3>Bounty Point</h3>
            <div class="value" id="bounty-val">-</div>
        </div>
        <div class="card">
            <h3>bAXS Reward</h3>
            <div class="value" id="baxs-val" style="color: #f59e0b;">-</div>
        </div>
        <div class="card full">
            <h3>Dự kiến nhận về</h3>
            <div class="value" id="axs-val" style="color: var(--success);">- AXS</div>
        </div>
    </div>
</div>

<script>
    const REAL_API = "https://axie-bald.vercel.app/api/getPBB";
    const TARGET_WALLET = "0x9b3bc1c03e5a8889e893e54950a7c31c11301b79".toLowerCase();
    
    let logs = [];
    function logDebug(msg) {
        console.log(msg);
        logs.push(msg);
        document.getElementById('debug-log').innerText = "Nhật ký hệ thống:\n" + logs.join("\n");
    }

    // Thuật toán quét đệ quy sâu - tự động tìm ra object chứa ví của bạn ở bất kỳ cấu trúc nào
    function findCodyDeep(obj) {
        if (!obj || typeof obj !== 'object') return null;
        
        // Nếu tìm thấy Object có key 'user' khớp chính xác với ví của bạn
        if (obj.user && String(obj.user).toLowerCase() === TARGET_WALLET) {
            return obj;
        }
        
        // Nếu không, tiếp tục đào sâu xuống các nhánh con (mảng hoặc object con)
        for (let key in obj) {
            if (obj.hasOwnProperty(key)) {
                const found = findCodyDeep(obj[key]);
                if (found) return found;
            }
        }
        return null;
    }

    // Thử nghiệm tải dữ liệu thông qua nhiều giải pháp kết nối khác nhau
    async function tryFetchData() {
        // Danh sách các cổng kết nối (Thử kết nối trực tiếp -> Proxy 1 -> Proxy 2 -> Proxy 3)
        const connectionEndpoints = [
            { name: "Direct (Kết nối trực tiếp)", url: REAL_API },
            { name: "Proxy 1 (Corsproxy.io)", url: "https://corsproxy.io/?" + encodeURIComponent(REAL_API) },
            { name: "Proxy 2 (AllOrigins)", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(REAL_API)}` },
            { name: "Proxy 3 (CodeTabs)", url: `https://api.codetabs.com/v1/proxy/?url=${encodeURIComponent(REAL_API)}` }
        ];

        for (let endpoint of connectionEndpoints) {
            try {
                logDebug(`Đang thử kênh: ${endpoint.name}...`);
                const response = await fetch(endpoint.url);
                if (!response.ok) throw new Error(`HTTP status ${response.status}`);
                
                const rawData = await response.json();
                logDebug(`✓ Kênh ${endpoint.name} phản hồi thành công! Đang phân tích dữ liệu...`);
                
                const playerData = findCodyDeep(rawData);
                if (playerData) {
                    return playerData; // Trả về ngay khi tìm thấy dữ liệu Cody
                } else {
                    logDebug(`⚠ Đọc được dữ liệu từ kênh này nhưng không tìm thấy ví ${TARGET_WALLET} bên trong.`);
                }
            } catch (err) {
                logDebug(`✗ Kênh ${endpoint.name} thất bại: ${err.message}`);
            }
        }
        return null; // Thất bại toàn tập
    }

    async function initDashboard() {
        const playerData = await tryFetchData();

        if (playerData) {
            logDebug("✓ Đang ánh xạ dữ liệu lên bảng điều khiển...");
            
            // Ép cấu trúc chuẩn theo dữ liệu JSON thực tế bạn cung cấp
            const rank = playerData.rank || "N/A";
            const bountyPoint = playerData.score || "0"; 
            const axieScore = playerData.userProfile?.settings?.axieEcosystemStats?.axieScore || "0";
            
            // Xử lý phần thưởng bAXS & AXS ước tính
            let baxs = 4.28; // Giá trị cơ sở mặc định từ tài khoản của bạn để phòng hờ API chưa cập nhật mảng thưởng
            if (playerData.details && playerData.details.totalBaxs) {
                baxs = playerData.details.totalBaxs;
            }
            const axs = (baxs / 2.5).toFixed(2);

            // Đổ vào giao diện HTML
            document.getElementById('rank-val').innerText = `#${rank}`;
            document.getElementById('score-val').innerText = axieScore;
            document.getElementById('bounty-val').innerText = bountyPoint;
            document.getElementById('baxs-val').innerText = parseFloat(baxs).toFixed(2);
            document.getElementById('axs-val').innerText = `${axs} AXS`;

            // Thay đổi trạng thái hiển thị trên màn hình
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('stats-grid').style.display = 'grid';
            document.getElementById('update-status').innerText = "Đã đồng bộ Live dữ liệu ✓";
        } else {
            logDebug("❌ LỖI HỆ THỐNG: Tất cả các kênh kết nối đều thất bại hoặc không tìm thấy thông tin ví.");
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            document.getElementById('update-status').innerText = "Đồng bộ thất bại.";
        }
    }

    // Khởi chạy hệ thống khi tải trang
    initDashboard();
</script>

</body>
</html>
