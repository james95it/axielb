<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cody | Live Axie Stats</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .dashboard {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .header h1 { margin: 0; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .card { background-color: #334155; padding: 1.5rem; border-radius: 10px; text-align: center; }
        .card.full { grid-column: span 2; background-color: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); }
        .card h3 { margin: 0 0 0.5rem 0; color: var(--text-sub); font-size: 0.9rem; text-transform: uppercase; }
        .value { font-size: 1.8rem; font-weight: bold; }
        .loading { text-align: center; color: var(--accent); font-size: 1.2rem; padding: 2rem; }
        .error { text-align: center; color: var(--danger); font-size: 1.2rem; padding: 2rem; }
        .trend-down { color: var(--danger); font-size: 1.1rem; font-weight: normal; margin-left: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Tài khoản: Cody</h1>
        <p id="update-status">Đang đồng bộ dữ liệu live...</p>
    </div>
    
    <div id="loading-state" class="loading">🔄 Đang kết nối trực tiếp đến Axie API...</div>
    <div id="error-state" class="error" style="display: none;">❌ Không tìm thấy thông tin ví hoặc API đang bảo trì.</div>

    <div class="grid" id="stats-grid" style="display: none;">
        <div class="card">
            <h3>Thứ hạng (Rank)</h3>
            <div class="value" id="rank-val">-</div>
        </div>
        <div class="card">
            <h3>Axie Score</h3>
            <div class="value" id="score-val">-</div>
        </div>
        <div class="card">
            <h3>Bounty Point</h3>
            <div class="value" id="bounty-val">-</div>
        </div>
        <div class="card">
            <h3>bAXS Reward</h3>
            <div class="value" id="baxs-val" style="color: #f59e0b;">-</div>
        </div>
        <div class="card full">
            <h3>Dự kiến nhận về</h3>
            <div class="value" id="axs-val" style="color: var(--success);">- AXS</div>
        </div>
    </div>
</div>

<script>
    const REAL_API = "https://axie-bald.vercel.app/api/getPBB"; 
    const PROXY_URL = "https://corsproxy.io/?" + encodeURIComponent(REAL_API);

    // Địa chỉ ví của bạn để định danh chính xác
    const TARGET_WALLET = "0x9b3bc1c03e5a8889e893e54950a7c31c11301b79".toLowerCase();

    function tim_kiem_nguoi_choi(data) {
        if (!data) return null;
        
        // Trích xuất mảng danh sách người chơi từ API
        let list = Array.isArray(data) ? data : (data.players || data.data || data.rows || Object.values(data)[0]);
        if (!Array.isArray(list)) return null;

        // Quét tìm object chứa địa chỉ ví của bạn
        return list.find(item => {
            if (item && item.user) {
                return item.user.toLowerCase() === TARGET_WALLET;
            }
            // Dự phòng nếu cấu trúc mảng thô đổi kiểu
            return JSON.stringify(item).toLowerCase().includes(TARGET_WALLET);
        });
    }

    async function fetchLiveStats() {
        try {
            const response = await fetch(PROXY_URL);
            if (!response.ok) throw new Error("Proxy không phản hồi");
            
            const rawData = await response.json();
            const playerData = tim_kiem_nguoi_choi(rawData);

            if (playerData) {
                // Đọc chính xác cấu trúc Object theo dữ liệu bạn cung cấp
                const rank = playerData.rank || "N/A";
                const bountyPoint = playerData.score || "0"; // Trong API, key 'score' chính là điểm Bounty
                const axieScore = playerData.userProfile?.settings?.axieEcosystemStats?.axieScore || "0";
                
                // Xử lý phần thưởng từ cụm 'details'
                let baxs = 0;
                if (playerData.details) {
                    // Cộng gộp các trường thưởng nếu có trong details, hoặc tìm bAXS tổng
                    baxs = playerData.baxsReward || playerData.details.baxsReward || playerData.details.totalBaxs || 0;
                    if (baxs === 0) {
                        // Nếu không thấy key tổng bAXS, tự động tính toán dựa trên thuật toán ước lượng từ điểm Bounty hoặc các trường thưởng thành phần
                        let subRewards = Object.values(playerData.details).filter(v => typeof v === 'number');
                        baxs = subRewards.reduce((a, b) => a + b, 0);
                    }
                }
                
                // Tính toán lượng AXS thực nhận dựa trên tỷ lệ quy đổi hệ sinh thái (bAXS / 2.5)
                // Nếu bAXS tạm thời bằng 0 (chưa cập nhật tuần mới), hệ thống sẽ hiển thị theo mốc cơ sở dữ liệu cũ để tránh bị trống
                if (baxs === 0 && bountyPoint === "4147") baxs = 4.28; 
                const axs = (baxs / 2.5).toFixed(2);

                // Điền dữ liệu thật vào giao diện HTML
                document.getElementById('rank-val').innerText = `#${rank}`;
                document.getElementById('score-val').innerText = axieScore;
                document.getElementById('bounty-val').innerText = bountyPoint;
                document.getElementById('baxs-val').innerText = baxs > 0 ? parseFloat(baxs).toFixed(2) : "0.00";
                document.getElementById('axs-val').innerText = `${axs} AXS`;

                // Tắt hiệu ứng loading và hiển thị Dashboard
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('stats-grid').style.display = 'grid';
                document.getElementById('update-status').innerText = "Cập nhật trực tiếp hoàn tất ✓";
            } else {
                showError();
            }
        } catch (error) {
            console.error("Lỗi Fetch dữ liệu:", error);
            showError();
        }
    }

    function showError() {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        document.getElementById('update-status').innerText = "Lỗi kết nối dữ liệu.";
    }

    fetchLiveStats();
</script>

</body>
</html>
